<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StagePass</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <h1>StagePass</h1>
        <h2>Login to Your Account</h2>
        <div id="errorMessage" class="message error" style="display:none;"></div> <!-- Error message container -->
        <div id="successMessage" class="message success" style="display:none;"></div> <!-- Success message container -->

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>  <!-- Username label -->
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>  <!-- Password label -->
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Login</button>
        </form>

        <div class="auth-links">
            <p>Don't have an account? <a href="signup.html">Sign up here</a></p> <!-- Link to signup page -->
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
